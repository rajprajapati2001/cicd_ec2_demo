name: Node.js CI/CD to AWS EC2

on:
  push:
    branches: [ main ] # Triggers on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Match your local version

    - name: Install Dependencies
      run: npm install

    # This step logs into EC2 and runs commands
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/your-repo-folder
          git pull origin main
          npm install
          pm2 restart your-app-name || pm2 start index.js --name your-app-name