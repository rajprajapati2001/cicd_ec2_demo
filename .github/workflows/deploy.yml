name: Node.js CI/CD to AWS EC2

on:
  push:
    branches: [ main ] # Triggers on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Match your local version

    - name: Install Dependencies
      run: npm install

    # This step logs into EC2 and runs commands
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Load NVM if you are using it
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # Navigate and Deploy
          cd /home/ubuntu/cicd_ec2_demo
          git pull origin main
          npm install
          # Restart the app
          pm2 restart cicd_ec2_demo || pm2 start index.js --name "cicd_ec2_demo"